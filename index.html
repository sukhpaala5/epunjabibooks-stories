<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Punjabi Stories</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .story {
            background: white;
            margin: 20px auto;
            padding: 15px;
            max-width: 700px;
            border-radius: 5px;
        }
        h2 {
            color: #333;
        }
        p {
            line-height: 1.6;
        }
    </style>
</head>
<body>

<header>
    <h1>Punjabi Kahaniyaan</h1>
</header>

<div class="story">
    <h2>Ohdi Yaad</h2>
    <p>
        Ajj vi oh din yaad aunda hai... jadon asi pehli vaar mile si.
        Oh hassi, te duniya ruk gayi si.
    </p>
</div>

<div class="story">
    <h2>Adhoori Gal</h2>
    <p>
        Kujh gallan kehni reh gayian... te kujh rishtay adhoore reh gaye.
    </p>
</div>

</body>
</html>
